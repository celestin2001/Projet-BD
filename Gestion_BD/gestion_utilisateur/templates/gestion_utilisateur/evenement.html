{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Événements - Maison Africaine de la BD</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/main.min.css">

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.10/locales/fr.js"></script>
    
    <style>
        :root {
            --primary-blue: #007bff;
            --text-color: #343a40;
            --shadow-color: rgba(0, 0, 0, 0.08);
            --content-max-width: 1240px;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f4f7f9;
            color: var(--text-color);
            overflow-x: hidden;
        }

        .page-container {
            max-width: var(--content-max-width);
            margin: 0 auto;
            padding: 1rem 10px;
        }
        @media (min-width: 768px) { .page-container { padding: 2rem 15px; } }

        h1.page-title {
            text-align: center;
            color: var(--primary-blue);
            font-weight: 700;
            font-size: 1.8rem;
        }
        @media (min-width: 768px) { h1.page-title { font-size: 2.25rem; } }

        /* --- CALENDAR RESPONSIVITY --- */
        #calendar {
            background: #fff;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 0 25px var(--shadow-color);
            border: 1px solid #dee2e6;
        }
        @media (min-width: 768px) { #calendar { padding: 25px; } }

        /* Correction toolbar sur mobile */
        .fc .fc-toolbar { flex-direction: column; gap: 10px; }
        @media (min-width: 768px) { .fc .fc-toolbar { flex-direction: row; } }

        /* --- CURSEUR ET ETATS --- */
        .fc-event, .fc-list-item { cursor: pointer !important; }
        .fc-event:hover { opacity: 0.9; transition: opacity 0.2s; }

        /* --- MINIATURES --- */
        .event-custom-content { display: flex; align-items: center; gap: 8px; width: 100%; }
        .event-thumbnail {
            width: 25px; height: 25px;
            object-fit: cover; border-radius: 4px; flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        @media (min-width: 768px) { .event-thumbnail { width: 30px; height: 30px; } }
        .event-title-text { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        /* --- TOOLTIP (POPOVER) --- */
        .tooltip {
            position: absolute; z-index: 10000;
            background: #212529; color: white;
            padding: 10px 15px; border-radius: 8px;
            pointer-events: none; display: none; opacity: 0;
            transition: opacity 0.1s; max-width: 300px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .tooltip.visible { opacity: 1; }
        .tooltip-top:before {
            content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 8px solid #212529;
        }
        .tooltip-bottom:before {
            content: ''; position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
            border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 8px solid #212529;
        }

        /* --- MODALE --- */
        #eventModal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; padding: 25px; border-radius: 10px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            width: 90vw; max-width: 550px; max-height: 90vh; overflow-y: auto; z-index: 1055;
        }
        #eventModal img { width: 100%; height: 220px; object-fit: cover; border-radius: 8px; margin-bottom: 1rem; }
    </style>
</head>
<body>

    {% include "gestion_content/header.html" %}

    <div class="page-container">
        <h1 class="page-title">Calendrier des Événements 🗓️</h1>
        <p class="text-center text-muted mb-4">Découvrez tous nos événements à venir.</p>
        <input type="text" id="eventSearch" class="form-control mx-auto mb-4" style="max-width:500px;" placeholder="🔍 Rechercher un événement...">
        <div id="calendar"></div>
    </div>

    <div id="eventModal-backdrop" onclick="closeEventModal()" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1050;display:none;"></div>
    <div id="eventModal">
        <button type="button" class="btn-close" onclick="closeEventModal()" style="position:absolute;top:15px;right:15px;"></button>
        <img id="modalImage" src="" alt="Affiche">
        <h3 id="modalTitle" style="color:var(--primary-blue);"></h3>
        <p><strong>Lieu :</strong> <span id="modalLocation"></span></p>
        <p><strong>Début :</strong> <span id="modalStart"></span></p>
        <p><strong>Fin :</strong> <span id="modalEnd"></span></p>
        <p><strong>Description :</strong></p>
        <p id="modalDescription" style="white-space: pre-wrap;"></p>
        <div class="text-end mt-3">
             <a href="#" id="modalLink" class="btn btn-sm btn-primary" target="_blank" style="display:none;">Voir les détails</a>
        </div>
    </div>

    {% include "gestion_content/footer.html" %}

    <script>
        function closeEventModal() {
            document.getElementById('eventModal').style.display = 'none';
            document.getElementById('eventModal-backdrop').style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', function () {
            const calendarEl = document.getElementById('calendar');
            const tooltipEl = document.createElement('div');
            tooltipEl.className = 'tooltip';
            document.body.appendChild(tooltipEl);

            const calendar = new FullCalendar.Calendar(calendarEl, {
                locale: 'fr',
                initialView: window.innerWidth < 768 ? 'listWeek' : 'dayGridMonth',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,listWeek'
                },
                
                // RENDU DU CONTENU (Images + Titre)
                eventContent: function(arg) {
                    const containerEl = document.createElement('div');
                    containerEl.className = 'event-custom-content';
                    const imgEl = document.createElement('img');
                    imgEl.src = arg.event.extendedProps.image;
                    imgEl.className = 'event-thumbnail';
                    const titleEl = document.createElement('span');
                    titleEl.className = 'event-title-text';
                    titleEl.textContent = arg.event.title;
                    containerEl.appendChild(imgEl);
                    containerEl.appendChild(titleEl);
                    return { domNodes: [containerEl] };
                },

                events: [
                    {% for e in evenements %}
                    {
                        title: '{{ e.titre_evenement|escapejs }}',
                        start: '{{ e.date_evenement|date:"Y-m-d" }}{% if e.heure_evenement %}T{{ e.heure_evenement|time:"H:i:s" }}{% endif %}',
                        {% if e.date_fin_evenement %}end: '{{ e.date_fin_evenement|date:"Y-m-d" }}T23:59:59',{% endif %}
                        color: '{{ e.couleur_evenement|default:"#007bff" }}', 
                        extendedProps: {
                            location: '{{ e.lieu_evenement|escapejs|default:"Non spécifié" }}',
                            description: `{{ e.description|escapejs|default:"Aucune description." }}`,
                            image: '{% if e.image %}{{ e.image.url }}{% else %}{% static "gestion_content/images/default_event.png" %}{% endif %}',
                            heure: '{{ e.heure_evenement|time:"H:i"|default:"" }}',
                            date_debut_formatted: '{{ e.date_evenement|date:"d/m/Y" }}',
                            date_fin_formatted: '{% if e.date_fin_evenement %}{{ e.date_fin_evenement|date:"d/m/Y" }}{% endif %}',
                            link: '{{ e.lien_details|escapejs }}'
                        }
                    }{% if not forloop.last %},{% endif %}
                    {% endfor %}
                ],

                // CLIC : Ouvre la modale
                eventClick: function (info) {
                    const e = info.event.extendedProps;
                    document.getElementById('modalTitle').textContent = info.event.title;
                    document.getElementById('modalLocation').textContent = e.location;
                    document.getElementById('modalStart').textContent = e.date_debut_formatted + (e.heure ? ` à ${e.heure}` : '');
                    document.getElementById('modalEnd').textContent = e.date_fin_formatted || 'Non précisée';
                    document.getElementById('modalDescription').innerHTML = e.description.replace(/\n/g, '<br>');
                    document.getElementById('modalImage').src = e.image;
                    const modalLink = document.getElementById('modalLink');
                    if(e.link && e.link !== '') {
                        modalLink.href = e.link;
                        modalLink.style.display = 'inline-block';
                    } else { modalLink.style.display = 'none'; }
                    document.getElementById('eventModal').style.display = 'block';
                    document.getElementById('eventModal-backdrop').style.display = 'block';
                    tooltipEl.classList.remove('visible');
                    tooltipEl.style.display = 'none';
                },

                // SURVOL : Ton système de popover
                eventMouseEnter: function (info) {
                    const e = info.event.extendedProps;
                    let timeStr = e.date_debut_formatted;
                    if (e.heure) timeStr += ` ${e.heure}`;
                    tooltipEl.innerHTML = `
                        <div style="font-weight:600; margin-bottom:5px; color:${info.event.backgroundColor};">${info.event.title}</div>
                        <div style="font-size:0.9em;">
                            <div><i class="fas fa-map-marker-alt me-2"></i> ${e.location}</div>
                            <div><i class="fas fa-clock me-2"></i> ${timeStr}</div>
                        </div>`;
                    tooltipEl.style.display = 'block';
                    const rect = info.el.getBoundingClientRect();
                    const top = rect.top + window.scrollY - tooltipEl.offsetHeight - 12;
                    const left = rect.left + window.scrollX + (rect.width / 2) - (tooltipEl.offsetWidth / 2);
                    tooltipEl.style.left = left + 'px';
                    tooltipEl.style.top = top + 'px';
                    tooltipEl.className = 'tooltip visible tooltip-top';
                },

                eventMouseLeave: function () {
                    tooltipEl.classList.remove('visible');
                    setTimeout(() => { tooltipEl.style.display = 'none'; }, 50);
                },

                // RESPONSIVITÉ
                windowResize: function() {
                    if (window.innerWidth < 768) {
                        calendar.changeView('listWeek');
                    } else {
                        calendar.changeView('dayGridMonth');
                    }
                }
            });
            calendar.render();

            // RECHERCHE
            document.getElementById('eventSearch').addEventListener('input', function (e) {
                const search = e.target.value.toLowerCase().trim();
                calendar.getEvents().forEach(event => {
                    const match = event.title.toLowerCase().includes(search) || 
                                  event.extendedProps.location.toLowerCase().includes(search);
                    event.setProp('display', match ? 'auto' : 'none');
                });
            });
        });
    </script>
</body>
</html>
