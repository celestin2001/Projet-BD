{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier le Mot de Passe - BD Actu</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #007bff;
            --light-blue-bg: #e0f2f7;
            --dark-blue: #0056b3;
            --text-color: #333;
            --error-red: #D21034;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--light-blue-bg);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            flex-direction: column;
        }

        .password-container {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            animation: fadeInUp 0.8s ease-in-out;
        }

        .page-title {
            font-size: 1.8em;
            font-weight: bold;
            color: var(--primary-blue);
            margin-bottom: 10px;
            text-align: center;
        }

        .page-subtitle {
            font-size: 0.9em;
            color: #666;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-control {
            border: 1px solid #ced4da;
            border-radius: 8px;
            padding: 12px 15px;
            transition: all 0.3s ease-in-out;
        }

        .form-control:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
        }

        .btn-submit {
            background-color: var(--primary-blue);
            color: #fff;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            width: 100%;
            transition: background-color 0.3s;
        }

        .btn-submit:hover:not(:disabled) {
            background-color: var(--dark-blue);
        }

        .btn-submit:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .validation-error {
            color: var(--error-red);
            font-size: 0.85em;
            margin-top: 5px;
            display: none;
        }

        /* Même bouton de retour que ta page login */
        .back-to-home-link {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: inline-flex;
            align-items: center;
            background-color: var(--primary-blue);
            color: #fff;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .back-to-home-link:hover {
            background-color: var(--dark-blue);
            transform: translateY(-3px);
            color: #fff;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <a href="{% url 'home' %}" class="back-to-home-link">
        <i class="fas fa-arrow-left me-2"></i> Retour
    </a>

    <div class="password-container">
        <h4 class="page-title">Sécurité du compte</h4>
        <p class="page-subtitle">Veuillez choisir un nouveau mot de passe robuste.</p>

        <form method="post" id="passwordForm">
            {% csrf_token %}
            
            <div class="form-group mb-3">
                <label class="form-label">Nouveau mot de passe</label>
                <input type="password" id="new-password" name="new-password" 
                       class="form-control" placeholder="Minimum 6 caractères" required
                       oninput="validatePasswords()">
                <div id="error-len" class="validation-error">Le mot de passe est trop court.</div>
            </div>

            <div class="form-group mb-4">
                <label class="form-label">Confirmer le mot de passe</label>
                <input type="password" id="confirm-password" name="confirm-password" 
                       class="form-control" placeholder="Répétez le mot de passe" required
                       oninput="validatePasswords()">
                <div id="error-match" class="validation-error">Les mots de passe ne correspondent pas.</div>
            </div>

            <button type="submit" id="submit-btn" class="btn-submit" disabled>
                Changer le mot de passe
            </button>
        </form>
    </div>

    <script>
        function validatePasswords() {
            const pass = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;
            const btn = document.getElementById('submit-btn');
            
            const errLen = document.getElementById('error-len');
            const errMatch = document.getElementById('error-match');

            let isLenOk = pass.length >= 6;
            let isMatchOk = pass === confirm && confirm !== "";

            // Affichage des erreurs
            errLen.style.display = (pass.length > 0 && !isLenOk) ? 'block' : 'none';
            errMatch.style.display = (confirm.length > 0 && !isMatchOk) ? 'block' : 'none';

            // Activation du bouton
            btn.disabled = !(isLenOk && isMatchOk);
        }
    </script>
</body>
</html>
