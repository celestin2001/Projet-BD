<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Récupération de compte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-primary { border-radius: 10px; padding: 12px; font-weight: 600; }
        .icon-box { font-size: 3rem; color: #0d6efd; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4">
                <div class="card-body text-center">
                    <div class="icon-box">
                        <i class="bi bi-shield-lock"></i>
                    </div>
                    <h3 class="card-title mb-3">Mot de passe oublié ?</h3>
                    <p class="text-muted mb-4">Entrez votre adresse email et nous vous enverrons un lien pour sécuriser votre compte.</p>

                    {% if info %}
                        <div class="alert alert-success d-flex align-items-center" role="alert">
                            <i class="bi bi-check-circle-fill me-2"></i>
                            <div>{{ info }}</div>
                        </div>
                        <a href="{% url 'signin' %}" class="btn btn-outline-secondary w-100 mt-3">Retour à la connexion</a>
                    {% else %}
                        {% if errors %}
                            <div class="alert alert-danger">{{ errors }}</div>
                        {% endif %}

                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-4 text-start">
                                {% comment %} <label class="form-label fw-bold">Email professionnel</label> {% endcomment %}
                                <input type="email" name="email" class="form-control form-control-lg" placeholder="nom@ecole.com" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Envoyer le lien de récupération</button>
                        </form>
                    {% endif %}
                    
                    <div class="mt-4">
                        <a href="{% url 'signin' %}" class="text-decoration-none small text-muted">Se connecter</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
